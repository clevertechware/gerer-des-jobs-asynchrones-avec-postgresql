version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    container_name: gerer_ses_jobs_asynchrones_avec_postgresql_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gerer_ses_jobs_asynchrones_avec_postgresql
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gerer_ses_jobs_asynchrones_avec_postgresql_app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: gerer_ses_jobs_asynchrones_avec_postgresql
      DB_SSL_MODE: disable
      SERVER_PORT: 8080
      UPLOAD_DIR: /app/uploads
      WORKER_BATCH_SIZE: 5
      WORKER_POLL_INTERVAL_MS: 1000
      WORKER_CONCURRENCY: 3
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
